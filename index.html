<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Sorpresa!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0; /* Color de fondo */
            font-family: Arial, sans-serif;
        }
        .container {
            text-align: center;
        }
        img {
            max-width: 90%;
            max-height: 80vh;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="Enhorabuena.jpeg" alt="¡Enhorabuena!">
    </div>

    <script>
        // Esto lanza el confeti automáticamente al cargar la página
        window.onload = function() {
            // Confeti básico
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 }
            });
            
            // Opcional: Lanzar una segunda ráfaga un segundo después
            setTimeout(() => {
                confetti({
                    particleCount: 100,
                    spread: 100,
                    origin: { y: 0.6 }
                });
            }, 1000);
        };
    </script>
</body>
</html>
